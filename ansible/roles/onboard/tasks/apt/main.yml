---
- name: apt update
  ansible.builtin.package:
    update_cache: yes

- name: apt upgrade
  ansible.builtin.package:
    upgrade: dist

- name: Install unattended upgrades packages
  ansible.builtin.package:
    name: "{{ list_onboarding_unattended_upgrade_packages }}"
    state: present

- name: create unattended-upgrades configuration
  ansible.builtin.template:
    src: etc/apt/apt.conf.d/52unattended-upgrades-local.j2
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-local
    owner: root
    group: root
    mode: "0640"