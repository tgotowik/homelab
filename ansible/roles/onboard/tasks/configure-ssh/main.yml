---
- name: Ensure SSH directory exists
  file:
    path: "/home/{{ ansible_user }}/.ssh"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0700'

- name: Set authorized SSH keys
  ansible.builtin.template:
    src: home/user/.ssh/authorized_keys.j2
    dest: /home/{{ ansible_user }}/.ssh/authorized_keys
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'

- name: Set ssh config for root
  ansible.builtin.template:
    src: root/.ssh/config.j2
    dest: /root/.ssh/config
    owner: root
    group: root
    mode: '0600'

# Some security
- name: Disable root login
  ansible.builtin.lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: "PermitRootLogin no"
    state: present
    backup: yes
  notify:
    - restart ssh

- name: Set MaxAuthTries to 3
  ansible.builtin.lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: '^MaxAuthTries'
    line: "MaxAuthTries 3"
    state: present
    backup: yes
  notify:
    - restart ssh

- name: Set PermitEmptyPasswords no
  ansible.builtin.lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: '^PermitEmptyPasswords'
    line: "PermitEmptyPasswords no"
    state: present
    backup: yes
  notify:
    - restart ssh

# Disable other authentication methods
- name: Disable PasswordAuthentication login
  ansible.builtin.lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: "PasswordAuthentication no"
    state: present
    backup: yes
  notify:
    - restart ssh

- name: Set ChallengeResponseAuthentication no
  ansible.builtin.lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: '^ChallengeResponseAuthentication no'
    line: "ChallengeResponseAuthentication  no"
    state: present
    backup: yes
  notify:
    - restart ssh

- name: Set KerberosAuthentication  no
  ansible.builtin.lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: '^KerberosAuthentication'
    line: "KerberosAuthentication no"
    state: present
    backup: yes
  notify:
    - restart ssh

- name: Set GSSAPIAuthentication no
  ansible.builtin.lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: '^GSSAPIAuthentication'
    line: "GSSAPIAuthentication no"
    state: present
    backup: yes
  notify:
    - restart ssh

# disable x11
- name: Set X11Forwarding no
  ansible.builtin.lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: '^X11Forwarding'
    line: "X11Forwarding no"
    state: present
    backup: yes
  notify:
    - restart ssh
  