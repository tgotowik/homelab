---
- name: Create /root/.ssh directory 
  ansible.builtin.file:
    state: directory
    owner: root
    path: /root/.ssh
    mode: "0700"
    group: root

- name: Set /root/.ssh/authorized_keys 
  ansible.builtin.template:
    src: root/.ssh/authorized_keys.j2
    dest: /root/.ssh/authorized_keys
    owner: root
    mode: "0644"
    group: root
