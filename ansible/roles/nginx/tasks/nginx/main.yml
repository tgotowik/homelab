---
- name: Install webserver packages
  ansible.builtin.package:
    name: "{{ list_nginx_packages }}"
    state: present
    update_cache: true

- name: Copy /root/hostcert-ssl.conf
  ansible.builtin.template:
    src: root/hostcert-ssl.conf.j2
    dest: /root/hostcert-ssl.conf
    group: root
    owner: root
    mode: "0700"

- name: Remove /etc/nginx/sites-available/default config
  ansible.builtin.file:
    path: /etc/nginx/sites-available/default
    state: absent

- name: Remove /etc/nginx/sites-enabled/default config
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent