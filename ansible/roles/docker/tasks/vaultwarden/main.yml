---
- name: Ensure vaultwarden compose dir exists
  ansible.builtin.file:
    path: /opt/docker-compose/vaultwarden
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy vaultwarden docker-compose
  ansible.builtin.template:
    src: opt/docker-compose/vaultwarden/docker-compose.yml.j2
    dest: /opt/docker-compose/vaultwarden/docker-compose.yml
    group: root
    owner: root
    mode: "0644"

- name: Include webserver-specific tasks
  ansible.builtin.include_tasks: "{{ str_webserver_engine }}.yml"