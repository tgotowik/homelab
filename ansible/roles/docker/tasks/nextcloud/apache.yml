---
- name: Enable Apache HTTP/2 module
  ansible.builtin.command:
    cmd: a2enmod rewrite proxy proxy_http proxy_wstunnel ssl headers http2

- name: Copy apache2 conf
  ansible.builtin.template:
    src: etc/apache2/sites-available/nas.tgotowik.de.conf.j2
    dest: /etc/apache2/sites-available/nas.tgotowik.de.conf
    owner: root
    group: root
    mode: "0640"
  notify: reload apache2

- name: Enable site nas.tgotowik.de
  ansible.builtin.file:
    src: /etc/apache2/sites-available/nas.tgotowik.de.conf
    dest: /etc/apache2/sites-enabled/nas.tgotowik.de.conf
    state: link
  notify: restart apache2