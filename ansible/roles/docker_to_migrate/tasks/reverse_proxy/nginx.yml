---
- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Copy nginx tgotowik.de.conf
  ansible.builtin.template:
    src: etc/nginx/sites-available/tgotowik.de.conf.j2
    dest: /etc/nginx/sites-available/tgotowik.de.conf
    owner: root
    group: root
    mode: "0640"

- name: Enable site tgotowik.de
  ansible.builtin.file:
    src: /etc/nginx/sites-available/tgotowik.de.conf
    dest: /etc/nginx/sites-enabled/tgotowik.de.conf
    state: link
  notify: restart nginx