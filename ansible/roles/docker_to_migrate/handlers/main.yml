---
- name: restart apache2
  ansible.builtin.systemd:
    name: apache2
    state: restarted

- name: reload apache2
  ansible.builtin.systemd:
    name: apache2
    state: reloaded

- name: restart nginx
  ansible.builtin.systemd:
    name: nginx
    state: restarted

- name: reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded